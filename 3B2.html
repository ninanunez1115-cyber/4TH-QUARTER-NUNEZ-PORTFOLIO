<!DOCTYPE html>
<html>
<head>

h1 {text-transform: uppercase;}
.box {border:3px solid blue;padding:10px;width:300px;margin: auto;}
ul {list-style-type:square;}
</style>
</head>

<body>

<p>

</p>

<h2>My Favorite Programming Topics</h2>

<ul>
<li>HTML Basics</li>
<li>CSS Styling</li>
<li>Web Design</li>
</ul>

<div class="box">
This text has a border.
</div>

</body>
</html>
