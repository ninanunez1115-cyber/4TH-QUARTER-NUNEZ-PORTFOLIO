<!DOCTYPE html>
<html>
<head><title>3RD QUARTER LESSON 1</title>
<style>
body {Font-family:Arial,sans-serif;background-color: #f4f8fb;text-align: center;padding: 30px;}
h1 {color:darkblue;font-size: 36px;text-shadow: 2px 2px 4px lightgray;}
p {font-size: 20px;line-height: 1.6;color: #333;}
.bold {font-weight: bold;color: darkred;}
.italic {font-style: italic;color: green;}
.underline {text-decoration: underline;color: purple;}
</style>
</head>
<body>
<h1>CSS Typography</h1>
<p class="bold">This text is bold.</p>
<p class="italic">This text is italic.</p>
<p class="underline">This text is underlined.</p>
<p>Typography makes web pages more organized, readable, and attractive.</p>
</body>
</html>
